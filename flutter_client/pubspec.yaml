name: neural_kernel_client
description: Flutter client for Neural Kernel AI platform.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.0

  # Networking
  dio: ^5.4.0

  # Routing
  go_router: ^14.0.0

  # Storage
  shared_preferences: ^2.2.0

  # Files / download
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
