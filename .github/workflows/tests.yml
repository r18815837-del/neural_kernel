name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ----------------------------------------------------------------
  # Lint — fast fail before running tests
  # ----------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install ruff pyright

      - name: Ruff check (lint + format)
        run: |
          ruff check --select E,F,W,I --ignore E501 .
          ruff format --check .

      - name: Pyright type-check (basic)
        run: pyright --pythonversion 3.11 --level basic kernel/

  # ----------------------------------------------------------------
  # Core tests — the deep-learning framework
  # ----------------------------------------------------------------
  core-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run core tests
        run: pytest tests/ -v --tb=short -x -q --ignore=tests/test_cognition.py --ignore=tests/test_persistence.py --ignore=tests/test_persistence_sessions.py --ignore=tests/test_middleware.py --ignore=tests/test_api_schemas.py --ignore=tests/test_auth_api_key.py --ignore=tests/test_auth_client_routes.py --ignore=tests/test_auth_dependencies.py --ignore=tests/test_auth_errors.py --ignore=tests/test_jwt_bearer.py --ignore=tests/test_lifecycle.py --ignore=tests/test_org_access.py --ignore=tests/test_ownership_access.py --ignore=tests/test_ownership_api.py --ignore=tests/test_ownership_client_routes.py --ignore=tests/test_ownership_persistence.py --ignore=tests/test_integration_artifact_metadata_dto.py --ignore=tests/test_integration_client_contract.py --ignore=tests/test_integration_create_project_dto.py --ignore=tests/test_integration_dto.py --ignore=tests/test_integration_error_mapping.py --ignore=tests/test_integration_project_status_dto.py

      - name: Run parity tests
        run: pytest tests_parity/ -v --tb=short -q

  # ----------------------------------------------------------------
  # API & cognition tests — FastAPI, persistence, specialists
  # ----------------------------------------------------------------
  api-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install -r requirements.txt

      - name: Run cognition tests
        run: pytest tests/test_cognition.py -v --tb=short -q

      - name: Run persistence tests
        run: pytest tests/test_persistence.py tests/test_persistence_sessions.py -v --tb=short -q

      - name: Run middleware tests
        run: pytest tests/test_middleware.py -v --tb=short -q

      - name: Run auth tests
        run: pytest tests/test_auth_api_key.py tests/test_auth_dependencies.py tests/test_auth_errors.py tests/test_jwt_bearer.py -v --tb=short -q

      - name: Run lifecycle & ownership tests
        run: pytest tests/test_lifecycle.py tests/test_ownership_access.py tests/test_ownership_persistence.py -v --tb=short -q

      - name: Run integration / DTO tests
        run: pytest tests/test_integration_dto.py tests/test_integration_error_mapping.py tests/test_integration_client_contract.py tests/test_api_schemas.py -v --tb=short -q

  # ----------------------------------------------------------------
  # Smoke tests
  # ----------------------------------------------------------------
  smoke:
    runs-on: ubuntu-latest
    needs: [core-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Public API import smoke test
        run: |
          python -c "
          import kernel
          from kernel import Tensor
          print('kernel imports OK')
          "

      - name: Run smoke scripts (if present)
        run: |
          for f in smoke_*.py; do
            [ -f "$f" ] && python "$f" && echo "PASS: $f" || echo "SKIP: $f"
          done
